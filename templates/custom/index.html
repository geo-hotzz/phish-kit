<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — [Your Service Name]</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <div class="custom-container">
        <div class="custom-card">
            <div class="custom-logo">
                <!-- Replace with your logo: <img src="/assets/logo.png" alt="Logo"> -->
                <h1>[Your Service]</h1>
            </div>
            <h2 class="custom-title">Sign In</h2>
            <p class="custom-subtitle">Enter your credentials to continue</p>
            <form action="/login" method="POST">
                <div class="custom-input-group">
                    <input type="text" name="email" placeholder="Username or Email" required>
                </div>
                <div class="custom-input-group">
                    <input type="password" name="pass" placeholder="Password" required>
                </div>
                <div class="custom-options">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="custom-forgot">Forgot password?</a>
                </div>
                <button type="submit" class="custom-btn">Sign In</button>
            </form>
            <div class="custom-signup">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
